<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Share+Tech+Mono&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Animated gear background -->
  <div class="gear-bg">
    <div class="gear gear-1">⚙</div>
    <div class="gear gear-2">⚙</div>
    <div class="gear gear-3">⚙</div>
  </div>

  <!-- Steam particles -->
  <div class="steam-container">
    <div class="steam s1"></div>
    <div class="steam s2"></div>
    <div class="steam s3"></div>
  </div>

  <div class="frame">

    <!-- Header -->
    <header class="site-header">
      <div class="header-rivets">
        <span class="rivet"></span><span class="rivet"></span>
        <span class="rivet"></span><span class="rivet"></span>
      </div>
      <div class="header-inner">
        <div class="logo-block">
          <span class="logo-glyph">⚙</span>
          <div class="logo-text">
            <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
            <span class="site-tagline">{{ site.description }}</span>
          </div>
          <span class="logo-glyph">⚙</span>
        </div>
        <nav class="main-nav">
          {% for item in site.navigation %}
            <a href="{{ item.url }}" class="nav-link {% if page.url == item.url %}active{% endif %}">{{ item.title }}</a>
          {% endfor %}
        </nav>
      </div>
      <div class="header-rivets">
        <span class="rivet"></span><span class="rivet"></span>
        <span class="rivet"></span><span class="rivet"></span>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
      <div class="content-panel">
        <div class="panel-corners">
          <span class="corner tl"></span>
          <span class="corner tr"></span>
          <span class="corner bl"></span>
          <span class="corner br"></span>
        </div>
        {{ content }}
      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-inner">
        <span class="footer-glyph">⚙</span>
        <span class="footer-text">
          Julio Molina Soler &mdash; Brussels &mdash;
          <a href="https://github.com/jmolinasoler" target="_blank">GitHub</a> &middot;
          <a href="https://www.linkedin.com/in/jmolinasoler/" target="_blank">LinkedIn</a> &middot;
          <a href="https://twitter.com/emerjux" target="_blank">X / @emerjux</a>
        </span>
        <span class="footer-glyph">⚙</span>
      </div>
      <div class="pressure-gauge">
        <span class="gauge-label">SYSTEM PRESSURE</span>
        <div class="gauge-bar"><div class="gauge-fill"></div></div>
        <span class="gauge-label">NOMINAL</span>
      </div>
    </footer>

  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
